#
# Demonstrates each merge rule:
#   - scope: replaced (child wins)
#   - agent: replaced (narrowed to claude-code only)
#   - skills: same-identity entry overridden (anthropics/skills narrowed to one skill)
#            + new entry appended (a brand-new pack the parent doesn't reference)
#   - mcps: same-identity entry overridden (pivoshenko.ai mcps narrowed to one)

