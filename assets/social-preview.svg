<?xml version="1.0" encoding="UTF-8"?>
<!--
  GitHub social preview (Open Graph card) for kasetto.
  Canvas: 1280Г—640 вҖ” GitHub's recommended OG dimensions.
  Palette mirrors the popil flavor (lavender #b89cdc, yellow #d4b070)
  and the terminal frame from `assets/demo.svg`.

  Render via:
    rsvg-convert -w 1280 -h 640 assets/social-preview.svg -o assets/social-preview.png
  Upload the PNG under Settings вҶ’ Social preview on GitHub.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640" font-family="'JetBrainsMono Nerd Font Mono','JetBrainsMono NFM','Iosevka Nerd Font Mono',ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace">
  <!-- background -->
  <rect x="0" y="0" width="1280" height="640" fill="#1f1f1e"/>

  <!-- outline border -->
  <rect x="40" y="40" width="1200" height="560" rx="16" ry="16" fill="none" stroke="#b89cdc" stroke-width="2" opacity="0.4"/>

  <!-- ASCII wordmark вҖ” centered around x=640. ~17.2px advance per char Г— 59 chars вүҲ 1015px wide at font-size 30, so start x вүҲ 132. -->
  <text x="132" y="220" fill="#b89cdc" font-size="30" font-weight="700" xml:space="preserve">
    <tspan x="132" dy="0">в–Ҳв–Ҳв•—  в–Ҳв–Ҳв•— в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•— в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•—в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•—в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•—в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•— в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•—</tspan>
    <tspan x="132" dy="34">в–Ҳв–Ҳв•‘ в–Ҳв–Ҳв•”в•қв–Ҳв–Ҳв•”в•җв•җв–Ҳв–Ҳв•—в–Ҳв–Ҳв•”в•җв•җв•җв•җв•қв–Ҳв–Ҳв•”в•җв•җв•җв•җв•қв•ҡв•җв•җв–Ҳв–Ҳв•”в•җв•җв•қв•ҡв•җв•җв–Ҳв–Ҳв•”в•җв•җв•қв–Ҳв–Ҳв•”в•җв•җв•җв–Ҳв–Ҳв•—</tspan>
    <tspan x="132" dy="34">в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•”в•қ в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•‘в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•—в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•—     в–Ҳв–Ҳв•‘      в–Ҳв–Ҳв•‘   в–Ҳв–Ҳв•‘   в–Ҳв–Ҳв•‘</tspan>
    <tspan x="132" dy="34">в–Ҳв–Ҳв•”в•җв–Ҳв–Ҳв•— в–Ҳв–Ҳв•”в•җв•җв–Ҳв–Ҳв•‘в•ҡв•җв•җв•җв•җв–Ҳв–Ҳв•‘в–Ҳв–Ҳв•”в•җв•җв•қ     в–Ҳв–Ҳв•‘      в–Ҳв–Ҳв•‘   в–Ҳв–Ҳв•‘   в–Ҳв–Ҳв•‘</tspan>
    <tspan x="132" dy="34">в–Ҳв–Ҳв•‘  в–Ҳв–Ҳв•—в–Ҳв–Ҳв•‘  в–Ҳв–Ҳв•‘в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•‘в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•—   в–Ҳв–Ҳв•‘      в–Ҳв–Ҳв•‘   в•ҡв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•”в•қ</tspan>
    <tspan x="132" dy="34">в•ҡв•җв•қ  в•ҡв•җв•қв•ҡв•җв•қ  в•ҡв•җв•қв•ҡв•җв•җв•җв•җв•җв•җв•қв•ҡв•җв•җв•җв•җв•җв•җв•қ   в•ҡв•җв•қ      в•ҡв•җв•қ    в•ҡв•җв•җв•җв•җв•җв•қ</tspan>
  </text>

  <!-- tagline -->
  <text x="640" y="475" text-anchor="middle" fill="#e4e2de" font-size="26" letter-spacing="0.01em" xml:space="preserve">
    <tspan fill="#a8a195">A declarative </tspan><tspan fill="#e4e2de">AI agent environment manager</tspan><tspan fill="#a8a195">, written in </tspan><tspan fill="#e8a94d">Rust</tspan><tspan fill="#a8a195">.</tspan>
  </text>

  <!-- prompt + command -->
  <text x="640" y="520" text-anchor="middle" font-size="24" xml:space="preserve">
    <tspan fill="#e8a94d">вқҜ</tspan><tspan fill="#e4e2de"> kasetto </tspan><tspan fill="#e8a94d">sync</tspan>
  </text>

  <!-- chip strip totals -->
  <text x="640" y="560" text-anchor="middle" font-size="20" xml:space="preserve">
    <tspan fill="#e8a94d">в—Ҹ</tspan><tspan fill="#e4e2de"> 4 </tspan><tspan fill="#e8a94d">updated</tspan><tspan fill="#a8a195">    </tspan><tspan fill="#84c578">в—Ҹ</tspan><tspan fill="#e4e2de"> 2 </tspan><tspan fill="#84c578">added</tspan><tspan fill="#a8a195">    </tspan><tspan fill="#e87e6c">в—Ҹ</tspan><tspan fill="#e4e2de"> 1 </tspan><tspan fill="#e87e6c">removed</tspan><tspan fill="#a8a195">    </tspan><tspan fill="#6e6759">в—Ҹ</tspan><tspan fill="#e4e2de"> 11 </tspan><tspan fill="#a8a195">unchanged</tspan>
  </text>

  <!-- Japanese subtitle, popil yellow -->
  <text x="640" y="592" text-anchor="middle" fill="#d4b070" font-size="14" letter-spacing="0.4em" font-family="'Noto Sans Mono CJK JP','Noto Sans JP','Yu Gothic',sans-serif">гӮ№гӮӯгғ«гғ»гғ‘гғғгӮұгғјгӮёгғ»гғһгғҚгғјгӮёгғЈгғј</text>
</svg>
