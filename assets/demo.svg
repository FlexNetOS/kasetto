<?xml version="1.0" encoding="UTF-8"?>
<!--
  Animated kasetto session mock — mirrors the hero terminal on kasetto.dev.
  Three-scene loop: kasetto sync, then a cleared `kst add` screen, then a
  cleared `kst remove` screen. Palette aligned with `src/colors.rs` (CLI
  source of truth) and the popil surfaces from `site/app/globals.css`. SMIL
  animations are sandboxed via GitHub's camo proxy when embedded as an <img>;
  no scripts, no external fonts. 13-second loop.

  Animation phases:
    0.10s            ❯ kasetto sync                (prompt types)
    0.40s            ✓ Resolved …                  (lands)
    0.70 → 3.10s     source tree fills in          (per-row reveal)
    3.10s            chip strip totals
    5.00 → 5.30s     scene 1 fades out             (clear screen)
    5.60 → 6.40s     ❯ kst add anthropics/skills@v1.2.0 (one skill)
    6.70 → 7.50s     add resolution → tree → chip
    8.06 → 8.32s     scene 2 fades out             (clear screen)
    8.50 → 9.40s     ❯ kst remove mattpocock/skills (one skill)
    9.70 → 10.50s    remove resolution → tree → chip
    12.60 → 13.00s   fade out, restart
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 398" width="100%" preserveAspectRatio="xMidYMid meet" font-family="ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace" font-size="12">
