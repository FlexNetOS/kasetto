  <circle cx="16" cy="18" r="5" fill="#373634"/>
  <circle cx="32" cy="18" r="5" fill="#373634"/>
  <circle cx="48" cy="18" r="5" fill="#373634"/>
  <text x="70" y="23" fill="#6e6759" font-size="11" letter-spacing="0.08em">~/dev/kasetto</text>

