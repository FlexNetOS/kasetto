<?xml version="1.0" encoding="UTF-8"?>
<!--
  Animated kasetto sync mock — mirrors the hero terminal on kasetto.dev.
  Palette aligned with `src/colors.rs` (CLI source of truth) and the popil
  surfaces from `site/app/globals.css`. SMIL animations are sandboxed via
  GitHub's camo proxy when embedded as an <img>; no scripts, no external
  fonts. 7-second loop with line-by-line reveal, hold, then reset.

  Two-column layout: left column holds the prompt, Resolved summary, and
  source 1; right column holds sources 2-5 plus the chip strip. Wider
  aspect ratio so the demo can stay full-width in the README without
  dominating the page vertically.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1160 232" width="100%" preserveAspectRatio="xMidYMid meet" font-family="ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace" font-size="12">
