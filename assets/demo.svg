    </text>
    <text x="20" y="181" opacity="0"><tspan fill="#6e6759">  ├─ </tspan><tspan fill="#84c578">✓</tspan> <tspan fill="#e4e2de">mcp:github.json</tspan><tspan fill="#a8a195">         unchanged</tspan>
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.191;0.206;0.93;1" dur="7s" repeatCount="indefinite"/>
    </text>
    <text x="20" y="192" opacity="0"><tspan fill="#6e6759">  └─ </tspan><tspan fill="#84c578">✓</tspan> <tspan fill="#e4e2de">mcp:vercel.json</tspan><tspan fill="#a8a195">         unchanged</tspan>
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.203;0.217;0.93;1" dur="7s" repeatCount="indefinite"/>
