  <rect x="0" y="0" width="1160" height="232" rx="8" ry="8" fill="#1f1f1e"/>
  <rect x="0" y="0" width="1160" height="36" rx="8" ry="8" fill="#1a1a19"/>
  <rect x="0" y="28" width="1160" height="8" fill="#1a1a19"/>
  <line x1="0" y1="36" x2="1160" y2="36" stroke="#2e2e2c" stroke-width="1"/>
  <circle cx="16" cy="18" r="5" fill="#373634"/>
  <circle cx="32" cy="18" r="5" fill="#373634"/>
  <circle cx="48" cy="18" r="5" fill="#373634"/>
  <text x="70" y="23" fill="#6e6759" font-size="11" letter-spacing="0.08em">~/dev/kasetto</text>

