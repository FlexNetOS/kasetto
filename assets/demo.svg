      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.267;0.281;0.93;1" dur="7s" repeatCount="indefinite"/>
    </text>
    <text x="20" y="261" opacity="0"><tspan fill="#6e6759">  └─ </tspan><tspan fill="#84c578">✓</tspan> <tspan fill="#e4e2de">skill-creator</tspan><tspan fill="#a8a195">           unchanged</tspan>
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.279;0.293;0.93;1" dur="7s" repeatCount="indefinite"/>
    </text>

    <!-- source 3 -->
    <text x="20" y="275" opacity="0"><tspan fill="#84c578">✓</tspan> <tspan fill="#6cbfd3">github.com/vercel-labs/agent-skills</tspan>
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.300;0.314;0.93;1" dur="7s" repeatCount="indefinite"/>
    </text>
    <text x="20" y="286" opacity="0"><tspan fill="#6e6759">  ├─ </tspan><tspan fill="#84c578">✓</tspan> <tspan fill="#e4e2de">deploy-to-vercel</tspan><tspan fill="#a8a195">        unchanged</tspan>
